<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Verdi">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B3D2E"/>
      <stop offset="1" stop-color="#0A2A21"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="56" fill="url(#bg)"/>
  <!-- terminal prompt caret, a nod to the green screen -->
  <path d="M64 92 L92 112 L64 132" stroke="#1F8A5B" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.85"/>
  <!-- the V mark -->
  <path d="M104 84 L140 172 L176 84" stroke="#4ADE80" stroke-width="26" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- blinking-cursor block -->
  <rect x="120" y="186" width="40" height="16" rx="4" fill="#4ADE80"/>
</svg>
